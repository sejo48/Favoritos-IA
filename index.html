<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA HUB Pro - Jorge (Local)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617;
            color: #f1f5f9;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover {
            transform: translateY(-8px);
            border-color: #0ea5e9;
            box-shadow: 0 20px 30px -10px rgba(14, 165, 233, 0.2);
        }
        .gemini-gradient {
            background: linear-gradient(135deg, #4285f4, #9b51e0, #e91e63);
            background-size: 200% 200%;
            animation: gradientMove 5s ease infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .fav-glow {
            border: 1px solid rgba(234, 179, 8, 0.4) !important;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 md:mb-12">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div class="space-y-1">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 md:w-12 md:h-12 bg-sky-500 rounded-2xl flex items-center justify-center shadow-lg shadow-sky-500/20">
                            <svg xmlns="http://www.w3.org/2000/svg" class="text-white" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2Z"/><path d="M12 2a10 10 0 0 1 10 10h-10V2Z"/><path d="M12 12L2.69 15.5"/><path d="M12 12l8 4.5"/><path d="M12 12l-8-4.5"/><path d="M12 12V21"/></svg>
                        </div>
                        <h1 class="text-3xl md:text-4xl font-black text-white tracking-tighter uppercase">IA <span class="text-sky-500">HUB</span></h1>
                    </div>
                    <p class="text-slate-400 text-sm font-medium italic">Jorge, tus 25 herramientas en la palma de tu mano.</p>
                </div>
                
                <div class="flex items-center gap-2 md:gap-3">
                    <button onclick="toggleModal('geminiModal', true)" class="flex-1 md:flex-none px-4 md:px-6 py-3 md:py-4 gemini-gradient text-white rounded-2xl transition-all shadow-xl font-black flex items-center justify-center gap-2 uppercase text-[10px] md:text-sm">
                        ✨ Asistente
                    </button>
                    <button onclick="toggleModal('addModal', true)" class="flex-1 md:flex-none px-4 md:px-6 py-3 md:py-4 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl transition-all font-black flex items-center justify-center gap-2 uppercase text-[10px] md:text-sm">
                        Añadir
                    </button>
                </div>
            </div>

            <div class="mt-8 flex flex-col lg:flex-row gap-4">
                <div class="relative flex-1 group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </span>
                    <input type="text" id="searchInput" placeholder="Busca herramientas..." class="w-full bg-slate-900/80 border border-slate-800 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-sky-500 outline-none transition text-white font-medium text-sm">
                </div>
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                    <button data-cat="Todas" class="cat-btn px-5 py-3 bg-sky-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest whitespace-nowrap">Todas</button>
                    <button data-cat="Favoritos" class="cat-btn px-5 py-3 bg-slate-900 text-slate-400 rounded-xl text-[10px] font-black uppercase tracking-widest whitespace-nowrap">⭐ Favoritos</button>
                    <button data-cat="Texto" class="cat-btn px-5 py-3 bg-slate-900 text-slate-400 rounded-xl text-[10px] font-black uppercase tracking-widest whitespace-nowrap">Texto</button>
                    <button data-cat="Imagen" class="cat-btn px-5 py-3 bg-slate-900 text-slate-400 rounded-xl text-[10px] font-black uppercase tracking-widest whitespace-nowrap">Imagen</button>
                    <button data-cat="Video" class="cat-btn px-5 py-3 bg-slate-900 text-slate-400 rounded-xl text-[10px] font-black uppercase tracking-widest whitespace-nowrap">Video</button>
                </div>
            </div>
        </header>

        <div id="ai-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 mb-20"></div>
    </div>

    <!-- Modal: Añadir -->
    <div id="addModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="bg-slate-950 p-6 md:p-8 rounded-[2.5rem] w-full max-w-md border border-slate-800 shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-white text-center uppercase tracking-tighter">Nueva IA</h2>
            <div class="space-y-3">
                <input type="text" id="aiName" placeholder="Nombre de la herramienta" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-white outline-none focus:border-sky-500 text-sm">
                <input type="text" id="aiUrl" placeholder="URL (ej: google.com)" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-white outline-none focus:border-sky-500 text-sm">
                <input type="text" id="aiNote" placeholder="¿Para qué la usas?" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-white outline-none focus:border-sky-500 text-sm">
                <select id="aiCategory" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-white outline-none focus:border-sky-500 appearance-none text-sm">
                    <option value="Texto">Texto / Chat</option>
                    <option value="Imagen">Imagen / Arte</option>
                    <option value="Video">Video / Animación</option>
                    <option value="Audio">Audio / Voz</option>
                    <option value="Productividad">Productividad</option>
                    <option value="Código">Código / Dev</option>
                </select>
                <div class="flex gap-3 pt-4">
                    <button onclick="toggleModal('addModal', false)" class="flex-1 py-4 bg-slate-900 rounded-xl text-slate-500 font-black uppercase text-[10px]">Cerrar</button>
                    <button onclick="saveAI()" class="flex-1 py-4 bg-sky-600 rounded-xl text-white font-black uppercase text-[10px]">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Asistente Gemini -->
    <div id="geminiModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="bg-slate-950 p-6 md:p-8 rounded-[2.5rem] w-full max-w-2xl border border-slate-800 shadow-2xl flex flex-col h-full max-h-[85vh]">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 gemini-gradient rounded-lg flex items-center justify-center text-xs">✨</div>
                    <h2 class="text-lg font-black text-white uppercase tracking-tighter">Gemini</h2>
                </div>
                <button onclick="toggleModal('geminiModal', false)" class="text-slate-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="geminiResponse" class="flex-1 overflow-y-auto bg-slate-900/50 p-4 rounded-xl mb-4 text-slate-300 text-sm space-y-4 no-scrollbar">
                <p>Hola Jorge. Todo está listo para uso móvil. ¿Qué necesitas consultar?</p>
            </div>
            <div class="relative">
                <input type="text" id="geminiInput" placeholder="Escribe aquí..." class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 pr-14 text-white outline-none focus:border-sky-500 text-sm">
                <button id="sendGemini" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-sky-600 rounded-lg flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'jorge_ia_hub_data';
        const apiKey = ""; 
        
        let myIAs = [];
        let searchQuery = '';
        let currentFilter = 'Todas';

        const defaultRegistry = [
            { id: '1', name: 'ChatGPT', url: 'https://chat.openai.com', category: 'Texto', note: 'Chat general y razonamiento', favorite: true },
            { id: '2', name: 'Claude', url: 'https://claude.ai', category: 'Texto', note: 'Redacción humana y análisis', favorite: true },
            { id: '3', name: 'Perplexity', url: 'https://perplexity.ai', category: 'Texto', note: 'Buscador con fuentes reales', favorite: true },
            { id: '4', name: 'Gemini', url: 'https://gemini.google.com', category: 'Texto', note: 'Multimodal de Google', favorite: true },
            { id: '5', name: 'DeepSeek', url: 'https://deepseek.com', category: 'Texto', note: 'Potente razonamiento lógico', favorite: false },
            { id: '6', name: 'Mistral', url: 'https://mistral.ai', category: 'Texto', note: 'IA eficiente Open Source', favorite: false },
            { id: '7', name: 'Midjourney', url: 'https://midjourney.com', category: 'Imagen', note: 'Arte visual de alta calidad', favorite: true },
            { id: '8', name: 'DALL-E 3', url: 'https://openai.com/dall-e-3', category: 'Imagen', note: 'Integrado en ChatGPT', favorite: true },
            { id: '9', name: 'Leonardo.ai', url: 'https://leonardo.ai', category: 'Imagen', note: 'Assets y modelos de arte', favorite: false },
            { id: '10', name: 'Adobe Firefly', url: 'https://firefly.adobe.com', category: 'Imagen', note: 'IA para diseño profesional', favorite: false },
            { id: '11', name: 'Canva Magic', url: 'https://canva.com', category: 'Imagen', note: 'Diseño asistido fácil', favorite: false },
            { id: '12', name: 'Stable Diffusion', url: 'https://stability.ai', category: 'Imagen', note: 'Control total local', favorite: false },
            { id: '13', name: 'Runway Gen-3', url: 'https://runwayml.com', category: 'Video', note: 'Video cinematográfico', favorite: true },
            { id: '14', name: 'Luma Dream Machine', url: 'https://lumalabs.ai', category: 'Video', note: 'Videos realistas IA', favorite: false },
            { id: '15', name: 'Kling AI', url: 'https://klingai.com', category: 'Video', note: 'Video de alta fidelidad', favorite: false },
            { id: '16', name: 'HeyGen', url: 'https://heygen.com', category: 'Video', note: 'Avatares y clonación', favorite: false },
            { id: '17', name: 'Pika', url: 'https://pika.art', category: 'Video', note: 'Animación creativa', favorite: false },
            { id: '18', name: 'ElevenLabs', url: 'https://elevenlabs.io', category: 'Audio', note: 'Clonación de voz suprema', favorite: true },
            { id: '19', name: 'Suno AI', url: 'https://suno.com', category: 'Audio', note: 'Crea canciones completas', favorite: true },
            { id: '20', name: 'Udio', url: 'https://udio.com', category: 'Audio', note: 'Música de alta fidelidad', favorite: false },
            { id: '21', name: 'v0.dev', url: 'https://v0.dev', category: 'Código', note: 'UI React por prompts', favorite: true },
            { id: '22', name: 'Cursor', url: 'https://cursor.com', category: 'Código', note: 'Editor de código con IA', favorite: true },
            { id: '23', name: 'Gamma', url: 'https://gamma.app', category: 'Productividad', note: 'Webs y presentaciones', favorite: false },
            { id: '24', name: 'Notion AI', url: 'https://notion.so', category: 'Productividad', note: 'Organización inteligente', favorite: false },
            { id: '25', name: 'Tome', url: 'https://tome.app', category: 'Productividad', note: 'Narrativas y slides', favorite: false }
        ];

        function init() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                myIAs = JSON.parse(saved);
                if (myIAs.length < 25) {
                    const existingNames = myIAs.map(ia => ia.name);
                    const missing = defaultRegistry.filter(d => !existingNames.includes(d.name));
                    myIAs = [...myIAs, ...missing];
                    saveToStorage();
                }
            } else {
                myIAs = defaultRegistry;
                saveToStorage();
            }
            render();
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(myIAs));
        }

        window.render = () => {
            const grid = document.getElementById('ai-grid');
            if (!grid) return;
            grid.innerHTML = '';
            
            let filtered = myIAs.filter(ia => {
                const text = (ia.name + ia.category + (ia.note || '')).toLowerCase();
                const matchesSearch = text.includes(searchQuery.toLowerCase());
                const matchesCat = currentFilter === 'Todas' || (currentFilter === 'Favoritos' && ia.favorite) || ia.category === currentFilter;
                return matchesSearch && matchesCat;
            });

            filtered.sort((a, b) => b.favorite - a.favorite || a.name.localeCompare(b.name));

            filtered.forEach(ia => {
                const card = document.createElement('div');
                card.className = `glass-card p-5 md:p-6 rounded-[2rem] flex flex-col ${ia.favorite ? 'fav-glow border-yellow-500/30' : ''}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4 md:mb-6">
                        <div class="w-12 h-12 md:w-14 md:h-14 rounded-xl bg-slate-950 flex items-center justify-center p-2">
                            <img src="https://www.google.com/s2/favicons?domain=${new URL(ia.url).hostname}&sz=128" 
                                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103832.png'" class="w-full h-full object-contain">
                        </div>
                        <button onclick="toggleFav('${ia.id}')" class="p-2 active:scale-125 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="${ia.favorite ? '#eab308' : 'none'}" stroke="${ia.favorite ? '#eab308' : '#334155'}" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                        </button>
                    </div>
                    <div class="flex-1">
                        <span class="px-2 py-0.5 bg-sky-500/10 text-sky-400 text-[9px] font-black uppercase rounded mb-1 inline-block">${ia.category}</span>
                        <h3 class="text-lg font-black text-white leading-tight mb-1">${ia.name}</h3>
                        <p class="text-slate-500 text-xs italic line-clamp-2">"${ia.note || ''}"</p>
                    </div>
                    <div class="mt-6 flex gap-2">
                        <a href="${ia.url}" target="_blank" class="flex-1 py-3.5 bg-white text-slate-950 text-center rounded-xl font-black text-[10px] uppercase tracking-widest active:bg-sky-400">Abrir</a>
                        <button onclick="delIA('${ia.id}')" class="px-3 bg-slate-900/50 text-slate-700 active:text-red-500 rounded-xl">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        };

        window.toggleFav = (id) => {
            myIAs = myIAs.map(ia => ia.id === id ? {...ia, favorite: !ia.favorite} : ia);
            saveToStorage();
            render();
        };

        window.delIA = (id) => {
            if(confirm("¿Eliminar herramienta?")) {
                myIAs = myIAs.filter(ia => ia.id !== id);
                saveToStorage();
                render();
            }
        };

        window.saveAI = () => {
            const name = document.getElementById('aiName').value;
            const url = document.getElementById('aiUrl').value;
            const note = document.getElementById('aiNote').value;
            const category = document.getElementById('aiCategory').value;
            if (!name || !url) return;
            
            const newIA = {
                id: Date.now().toString(),
                name,
                url: url.startsWith('http') ? url : `https://${url}`,
                note,
                category,
                favorite: false
            };
            
            myIAs.push(newIA);
            saveToStorage();
            render();
            toggleModal('addModal', false);
            ['aiName', 'aiUrl', 'aiNote'].forEach(id => document.getElementById(id).value = '');
        };

        window.toggleModal = (id, show) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.toggle('hidden', !show);
            el.classList.toggle('flex', show);
        };

        document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value; render(); });
        
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentFilter = e.target.getAttribute('data-cat');
                document.querySelectorAll('.cat-btn').forEach(b => {
                    b.classList.replace('bg-sky-600', 'bg-slate-900');
                    b.classList.replace('text-white', 'text-slate-400');
                });
                e.target.classList.replace('bg-slate-900', 'bg-sky-600');
                e.target.classList.replace('text-slate-400', 'text-white');
                render();
            });
        });

        document.getElementById('sendGemini').onclick = async () => {
            const input = document.getElementById('geminiInput');
            const resDiv = document.getElementById('geminiResponse');
            const prompt = input.value.trim();
            if (!prompt) return;
            
            input.value = '';
            resDiv.innerHTML += `<div class="bg-slate-800 p-3 rounded-lg ml-6 text-right text-white font-bold text-xs">${prompt}</div>`;
            resDiv.innerHTML += `<div id="loading" class="text-sky-400 animate-pulse italic text-[10px]">✨ Pensando...</div>`;
            resDiv.scrollTop = resDiv.scrollHeight;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                document.getElementById('loading').remove();
                resDiv.innerHTML += `<div class="bg-sky-950/30 p-4 rounded-xl border border-sky-800/50 text-xs">${aiText}</div>`;
                resDiv.scrollTop = resDiv.scrollHeight;
            } catch (e) {
                const loadEl = document.getElementById('loading');
                if (loadEl) loadEl.innerText = "Error de conexión.";
            }
        };

        init();
    </script>
</body>
</html>
